name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build
        env:
          CGO_ENABLED: 1

      - name: Package
        run: Compress-Archive -Path build/bin/vibe-time.exe -DestinationPath build/bin/vibe-time-windows-amd64.zip

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/vibe-time-windows-amd64.zip
