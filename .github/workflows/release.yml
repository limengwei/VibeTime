name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            build_tags: ""
          - os: ubuntu-22.04
            platform: linux
            build_tags: "webkit2_41"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libglib2.0-dev pkg-config build-essential

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build ${{ matrix.build_tags != '' && format('-tags "{0}"', matrix.build_tags) || '' }}
        env:
          CGO_ENABLED: 1

      - name: Package Windows installer
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          mkdir -p build/bin/frontend
          cp -rf frontend/dist build/bin/frontend/
          makensis installer.nsi
          mv vibe-time-setup.exe build/bin/vibe-time-setup.exe

      - name: Package Linux
        if: matrix.platform == 'linux'
        run: |
          mkdir -p build/bin/vibe-time/frontend
          cp -r frontend/dist build/bin/vibe-time/frontend/
          tar -czvf vibe-time-linux-amd64.tar.gz -C build/bin vibe-time

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/bin/vibe-time-setup.exe
            vibe-time-linux-amd64.tar.gz
