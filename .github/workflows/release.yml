name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: .exe
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            ext: .app
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: .app
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ""

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build
        run: wails build -platform ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          CGO_ENABLED: 1

      - name: Package Windows
        if: matrix.goos == 'windows'
        run: |
          Compress-Archive -Path build/bin/vibe-time.exe -DestinationPath build/bin/vibe-time-windows-amd64.zip

      - name: Package macOS
        if: matrix.goos == 'darwin'
        run: |
          cd build/bin
          zip -r vibe-time-${{ matrix.goos }}-${{ matrix.goarch }}.zip vibe-time.app

      - name: Package Linux
        if: matrix.goos == 'linux'
        run: |
          cd build/bin
          tar czf vibe-time-linux-amd64.tar.gz vibe-time

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/bin/*.zip
            build/bin/*.tar.gz
