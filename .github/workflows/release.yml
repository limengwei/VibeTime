name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            ext: .exe
            archive: vibe-time-windows-amd64.zip
          - os: ubuntu-latest
            platform: linux
            ext: ""
            archive: vibe-time-linux-amd64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config build-essential

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build
        env:
          CGO_ENABLED: 1

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        run: Compress-Archive -Path build/bin/vibe-time.exe -DestinationPath build/bin/${{ matrix.archive }}

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: tar -czvf build/bin/${{ matrix.archive }} -C build/bin vibe-time

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/${{ matrix.archive }}
